<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presença Mobile</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 500px;
            /* Limita a largura para parecer celular no PC */
            margin: auto;
        }

        header {
            text-align: center;
            padding: 15px 0;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        header h1 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        /* Grid de Resumo em 2 colunas no mobile */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .db-card {
            background: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .db-card h3 {
            font-size: 0.7rem;
            margin: 0;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        .db-card .value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Formulário */
        .add-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: var(--secondary);
        }

        select,
        input[type="date"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            /* Evita zoom automático no iPhone */
            background-color: #f9f9f9;
        }

        /* Listas de Checkbox estilo Mobile */
        .list-container {
            border: 1px solid #eee;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
            background: #fff;
        }

        .item-check {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        .item-check:last-child {
            border-bottom: none;
        }

        .item-check input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }

        /* Botões Estilo Mobile */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .btn-main {
            background: var(--accent);
            color: white;
        }

        .btn-excel {
            background: var(--success);
            color: white;
        }

        .btn-admin {
            background: #95a5a6;
            color: white;
            font-size: 0.8rem;
            padding: 8px;
        }

        /* Transformando Tabela em Cards para Celular */
        .mobile-table-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            position: relative;
            border-left: 5px solid var(--accent);
        }

        .mobile-table-card div {
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .mobile-table-card .name {
            font-weight: bold;
            font-size: 1rem;
            color: var(--primary);
        }

        .mobile-table-card .status-tag {
            display: inline-block;
            background: #e8f4fd;
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .btn-sm {
            padding: 8px;
            font-size: 0.8rem;
            margin: 0;
        }

        .btn-del {
            background: var(--danger);
            color: white;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
        }

        .section-title {
            background: #f8f9fa;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
            border-radius: 5px;
        }
    </style>
</head>

        const listaStatus = ["PRESENTE", "PRESENTE - CONJUNTA", "PRESENTE - FORMATAÇÃO", "PRESENTE - PREVENTIVA", "INTERJORNADA(10h)", "INTERMEDIÁRIO (13h)", "INTERJORNADA(13h)", "INTERJORNADA(16h)", "INTERJORNADA (SEM RETORNO)", "NOTURNO", "FÉRIAS", "INSS", "ATESTADO", "FOLGA"];

        let registros = JSON.parse(localStorage.getItem('registros_presenca')) || [];
        let editIndex = null;

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataSelecionada').value = hoje;
            gerarCheckboxesStatus();
            atualizarTabela();
        };

        function gerarCheckboxesStatus() {
            const container = document.getElementById('statusCheckboxes');
            container.innerHTML = "";
            listaStatus.forEach(status => {
                const label = document.createElement('label');
                label.className = 'item-check';
                label.innerHTML = `<input type="checkbox" name="status" value="${status}"> ${status}`;
                container.appendChild(label);
            });
        }

        function filtrarSupervisores() {
            const ufSel = document.getElementById('uf').value;
            const superSelect = document.getElementById('supervisorTLP');
            superSelect.innerHTML = '<option disabled selected value="">Selecione o Supervisor</option>';
            document.getElementById('colaboradoresCheckboxes').innerHTML = "";

            const supervisores = [...new Set(Object.values(baseDados)
                .filter(item => item.uf === ufSel)
                .map(item => item.super))].sort();

            supervisores.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.text = s;
                superSelect.appendChild(opt);
            });
        }

        function filtrarColaboradores() {
            const superSel = document.getElementById('supervisorTLP').value;
            const container = document.getElementById('colaboradoresCheckboxes');
            container.innerHTML = "";

            const nomes = Object.keys(baseDados)
                .filter(n => baseDados[n].super === superSel)
                .sort();

            nomes.forEach(nome => {
                const label = document.createElement('label');
                label.className = 'item-check';
                label.innerHTML = `<input type="checkbox" name="colab" value="${nome}"> ${nome}`;
                container.appendChild(label);
            });
        }

        function adicionar() {
            const uf = document.getElementById('uf').value;
            const supervisor = document.getElementById('supervisorTLP').value;
            const data = document.getElementById('dataSelecionada').value;

            const colabsMarcados = Array.from(document.querySelectorAll('input[name="colab"]:checked')).map(i => i.value);
            const statusMarcados = Array.from(document.querySelectorAll('input[name="status"]:checked')).map(i => i.value);

            if (!uf || !supervisor || colabsMarcados.length === 0 || statusMarcados.length === 0) {
                alert("Preencha todos os passos!");
                return;
            }

            const statusTexto = statusMarcados.join(" / ");

            if (editIndex !== null) {
                const nome = colabsMarcados[0];
                const info = baseDados[nome];
                registros[editIndex] = {
                    uf, super: supervisor, colab: nome, status: statusTexto, data,
                    empresa: info.empresa, micro: info.micro, coord: info.coord
                };
                editIndex = null;
                document.getElementById('btnAdicionar').innerText = "✅ Confirmar Presença";
                document.getElementById('btnCancelar').style.display = "none";
            } else {
                colabsMarcados.forEach(nome => {
                    const info = baseDados[nome];
                    const existe = registros.find(r => r.colab === nome && r.data === data);
                    if (!existe) {
                        registros.push({
                            uf, super: supervisor, colab: nome, status: statusTexto, data,
                            empresa: info.empresa, micro: info.micro, coord: info.coord
                        });
                    }
                });
            }

            localStorage.setItem('registros_presenca', JSON.stringify(registros));
            resetForm();
            atualizarTabela();
            alert("Registros salvos!");
        }

        function resetForm() {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        }

        function atualizarTabela() {
            const container = document.getElementById('listaCards');
            const dataSel = document.getElementById('dataSelecionada').value;
            container.innerHTML = "";

            const filtrados = registros.filter(r => r.data === dataSel);

            if (filtrados.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum registro nesta data.</p>";
            }

            filtrados.forEach((r, idx) => {
                const globalIdx = registros.indexOf(r);
                container.innerHTML += `
                    <div class="mobile-table-card">
                        <div class="name">${r.colab}</div>
                        <div><span class="status-tag">${r.status}</span></div>
                        <div style="color:#666;">Sup: ${r.super}</div>
                        <div style="color:#999; font-size: 0.7rem;">${r.micro} | ${r.uf}</div>
                        <div class="card-actions">
                            <button class="btn-sm btn-edit" onclick="editar(${globalIdx})">Editar</button>
                            <button class="btn-sm btn-del" onclick="remover(${globalIdx})">Excluir</button>
                        </div>
                    </div>
                `;
            });
            atualizarCards();
        }

        function editar(index) {
            const r = registros[index];
            editIndex = index;
            document.getElementById('uf').value = r.uf;
            filtrarSupervisores();
            document.getElementById('supervisorTLP').value = r.super;
            filtrarColaboradores();

            setTimeout(() => {
                document.querySelectorAll('input[name="colab"]').forEach(i => i.checked = (i.value === r.colab));
                const sts = r.status.split(" / ");
                document.querySelectorAll('input[name="status"]').forEach(i => i.checked = sts.includes(i.value));
            }, 100);

            document.getElementById('btnAdicionar').innerText = "💾 Salvar Alteração";
            document.getElementById('btnCancelar').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function remover(index) {
            if (confirm("Excluir este registro?")) {
                registros.splice(index, 1);
                localStorage.setItem('registros_presenca', JSON.stringify(registros));
                atualizarTabela();
            }
        }

        function cancelarEdicao() {
            editIndex = null;
            resetForm();
            document.getElementById('btnAdicionar').innerText = "✅ Confirmar Presença";
            document.getElementById('btnCancelar').style.display = "none";
        }

        function trocarData() { atualizarTabela(); }

        function atualizarCards() {
            const dataSel = document.getElementById('dataSelecionada').value;
            const f = registros.filter(r => r.data === dataSel);
            document.getElementById('count-uf').innerText = new Set(f.map(r => r.uf)).size;
            document.getElementById('count-colab').innerText = f.length;
        }

        function exportarExcel() {
            let csv = "\uFEFFData;UF;Empresa;Micro Area;Colaborador;Supervisor;Coordenador;Status\n";
            registros.forEach(r => {
                csv += `${r.data};${r.uf};${r.empresa};${r.micro};${r.colab};${r.super};${r.coord};${r.status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `presenca_mobile.csv`;
            link.click();
        }

        function loginAdmin() {
            const senha = prompt("Senha:");
            if (senha === "admin123") alert("Acesso Liberado!");
        }
