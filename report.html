<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação Supervisor - Fase 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --vivo-purple: #660099;
            --vivo-light: #F2F2F2;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--vivo-light);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--vivo-purple);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .login-box {
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            max-width: 400px;
            margin: 40px auto;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        /* Estilo da Tabela Desktop */
        .table-responsive {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background: #f1f5f9;
            color: var(--vivo-purple);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* RESPONSIVIDADE PARA CELULAR (CARD LAYOUT) */
        @media screen and (max-width: 768px) {

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            /* Esconde os cabeçalhos da tabela no mobile */
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                margin-bottom: 15px;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
                background: #fff;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            }

            td {
                border: none;
                border-bottom: 1px solid #eee;
                position: relative;
                padding-left: 50%;
                /* Espaço para o label */
                white-space: normal;
                text-align: right;
                min-height: 35px;
            }

            /* Gera as etiquetas automáticas antes do valor */
            td:before {
                position: absolute;
                top: 12px;
                left: 12px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: bold;
                color: var(--vivo-purple);
                content: attr(data-label);
            }

            td:last-child {
                text-align: center;
                padding-left: 12px;
                background: #f8fafc;
            }

            td:last-child:before {
                content: "";
            }

            .btn-action {
                padding: 10px 20px;
                background: #eee;
                border-radius: 5px;
                margin: 5px;
            }
        }

        .filter-select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            margin-bottom: 10px;
        }

        .btn-auth {
            background: var(--vivo-purple);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        input,
        select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            width: 100%;
            margin-bottom: 10px;
        }

        .badge-status {
            padding: 5px 10px;
            border-radius: 12px;
            font-weight: bold;
            background: #e2e8f0;
            font-size: 11px;
        }
    </style>
</head>

    </div>

        const SENHA_GERAL = "123";
        let dadosDoSupervisor = [];

        function filtrarSupervisoresPorUF() {
            const uf = document.getElementById('selectUF').value;
            const select = document.getElementById('selectSupervisor');
            select.innerHTML = '<option value="">Selecione seu nome...</option>';
            const sups = [...new Set(Object.values(baseDados).filter(d => d.uf === uf).map(d => d.super))].sort();
            sups.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.innerHTML = s;
                select.appendChild(opt);
            });
        }

        function autenticar() {
            const sup = document.getElementById('selectSupervisor').value;
            const senha = document.getElementById('senhaSupervisor').value;
            if (sup && senha === SENHA_GERAL) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('reportArea').classList.remove('hidden');
                document.getElementById('nomeLogado').innerText = "Logado como: " + sup;
                carregarRelatorio(sup);
            } else { alert("Dados incorretos."); }
        }

        function carregarRelatorio(supervisorNome) {
            const db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            dadosDoSupervisor = (supervisorNome === "Max") ? db : db.filter(r => r.super === supervisorNome);

            const opTec = [...new Set(dadosDoSupervisor.map(r => r.tecnico))].sort();
            document.getElementById('f_tec').innerHTML = '<option value="">Filtrar Técnico: Todos</option>' + opTec.map(t => `<option value="${t}">${t}</option>`).join('');

            atualizarTabela();
        }

        function atualizarTabela() { filtrar(); }

        function renderizarTabela(dados) {
            const limite = parseInt(document.getElementById('limiteRegistros').value);
            const corpo = document.getElementById('corpoReport');

            corpo.innerHTML = dados.slice(0, limite).map(r => `
                <tr>
                    <td data-label="UF">${r.uf}</td>
                    <td data-label="EMPRESA">${r.empresa}</td>
                    <td data-label="BUCKET">${r.micro || r.bucket}</td>
                    <td data-label="MATRÍCULA">${r.matricula}</td>
                    <td data-label="TÉCNICO"><b>${r.tecnico}</b></td>
                    <td data-label="SUPERVISOR">${r.super}</td>
                    <td data-label="COORDENADOR">${r.coord}</td>
                    <td data-label="GERENTE">${r.gerente}</td>
                    <td data-label="STATUS"><span class="badge-status">${r.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="editarStatus('${r.id}')">✏️ Editar</button>
                        <button class="btn-action" onclick="excluir('${r.id}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrar() {
            const fTec = document.getElementById('f_tec').value;
            const fStatus = document.getElementById('f_status').value;
            const filtrados = dadosDoSupervisor.filter(r => {
                return (fTec === "" || r.tecnico === fTec) && (fStatus === "" || r.status === fStatus);
            });
            renderizarTabela(filtrados);
        }

        function editarStatus(id) {
            const opcao = prompt("1-PRESENTE, 2-FALTA, 3-ATESTADO, 4-FOLGA, 5-FÉRIAS");
            const mapa = { "1": "PRESENTE", "2": "FALTA", "3": "ATESTADO", "4": "FOLGA", "5": "FÉRIAS" };
            if (mapa[opcao]) {
                let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
                const i = db.findIndex(item => String(item.id) === String(id));
                if (i !== -1) {
                    db[i].status = mapa[opcao];
                    localStorage.setItem(DB_KEY, JSON.stringify(db));
                    carregarRelatorio(document.getElementById('selectSupervisor').value);
                }
            }
        }

        function excluir(id) {
            if (confirm("Excluir?")) {
                let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
                db = db.filter(item => String(item.id) !== String(id));
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                carregarRelatorio(document.getElementById('selectSupervisor').value);
            }
        }
    </script>
</body>
