<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Presença - Operacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --vivo-purple: #660099;
            --vivo-orange: #FF6600;
            --vivo-light: #F2F2F2;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--vivo-light);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--vivo-purple);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-v {
            width: 35px;
            height: 35px;
            background: var(--vivo-purple);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .db-card {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
            border-top: 4px solid var(--vivo-purple);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .db-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .db-card h3 {
            margin: 0;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
        }

        .db-card .value {
            font-size: 24px;
            font-weight: bold;
            color: var(--vivo-purple);
        }

        .add-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .section-header {
            grid-column: 1 / -1;
            background: var(--vivo-purple);
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            border-radius: 8px;
            font-weight: bold;
        }

        .list-container {
            grid-column: 1 / -1;
            background: #fff;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .item-check {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 11px;
            margin-top: 10px;
        }

        th {
            background: #f1f5f9;
            color: var(--vivo-purple);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .btn-primary {
            background: var(--vivo-purple);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        input,
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .controls-table {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        #inputBusca {
            flex-grow: 1;
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-v">V</div>
                <div>
                    <h1 style="margin:0; font-size: 1.5rem;">Gestão de Presença</h1>
                    <small style="color: #64748b;">Operacional Telefônica</small>
                </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="date" id="dataSelecionada" onchange="atualizarTabela()">
                <button class="btn-success" onclick="exportarExcel()">Exportar Excel</button>
                <button class="btn-danger" onclick="limparTudo()">Limpar Tudo</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="db-card">
                <h3>UF</h3><span class="value" id="count-uf">0</span>
            </div>
            <div class="db-card">
                <h3>Empresas</h3><span class="value" id="count-empresa">0</span>
            </div>
            <div class="db-card">
                <h3>Técnicos</h3><span class="value" id="count-colab">0</span>
            </div>
            <div class="db-card">
                <h3>Supervisores</h3><span class="value" id="count-super">0</span>
            </div>
            <div class="db-card">
                <h3>Gerentes</h3><span class="value" id="count-gerente">0</span>
            </div>
        </div>

        <div class="add-box">
            <select id="filtroUf" onchange="popularSupervisores()">
                <option value="">Filtro por UF</option>
            </select>
            <select id="filtroSuper" onchange="popularTecnicos()">
                <option value="">Filtro por Supervisor</option>
            </select>

            <div class="section-header">
                <span>SELECIONAR COLABORADORES</span>
                <button onclick="selectAll(true)"
                    style="background:white; color:var(--vivo-purple); border:none; border-radius:4px; font-size:10px; cursor:pointer; padding:2px 10px;">TODOS</button>
            </div>
            <div id="colabSection" class="list-container">
                <div id="listaTecnicos" style="display: contents;"></div>
            </div>

            <div class="section-header">DEFINIR STATUS (PRESENTE LANÇA O MÊS TODO)</div>
            <div id="statusRadios" style="grid-column: 1/-1; display:flex; gap:10px; flex-wrap:wrap;"></div>

            <button class="btn-primary" onclick="salvarPresenca()">EFETUAR LANÇAMENTO</button>
        </div>

        <div class="controls-table">
            <input type="text" id="inputBusca" onkeyup="atualizarTabela()"
                placeholder="🔍 Buscar por Nome ou Matrícula...">
            <select id="limiteRegistros" onchange="atualizarTabela()">
                <option value="5">Mostrar 5</option>
                <option value="10">Mostrar 10</option>
                <option value="20">Mostrar 20</option>
                <option value="100">Mostrar 100</option>
            </select>
        </div>

        <div style="overflow-x:auto;">
            <table id="tabelaPresenca">
                <thead>
                    <tr>
                        <th>UF</th>
                        <th>EMPRESA</th>
                        <th>BUCKET</th>
                        <th>MATRÍCULA</th>
                        <th>TÉCNICO</th>
                        <th>SUPERVISOR</th>
                        <th>COORDENADOR</th>
                        <th>GERENTE</th>
                        <th>STATUS</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

        window.onload = () => {
            document.getElementById('dataSelecionada').value = new Date().toISOString().split('T')[0];

        function popularUFs() {
            const ufs = [...new Set(Object.values(baseDados).map(d => d.uf))].sort();
            document.getElementById('filtroUf').innerHTML = '<option value="">Filtro por UF</option>' + ufs.map(u => `<option value="${u}">${u}</option>`).join('');
        }

        function popularSupervisores() {
            const uf = document.getElementById('filtroUf').value;
            const supers = [...new Set(Object.values(baseDados).filter(d => d.uf === uf).map(d => d.super))].sort();
            document.getElementById('filtroSuper').innerHTML = '<option value="">Filtro por Supervisor</option>' + supers.map(s => `<option value="${s}">${s}</option>`).join('');
            document.getElementById('listaTecnicos').innerHTML = '';
        }

        function popularTecnicos() {
            const sv = document.getElementById('filtroSuper').value;
            const tecnicos = Object.keys(baseDados).filter(n => baseDados[n].super === sv).sort();
            document.getElementById('listaTecnicos').innerHTML = tecnicos.map(t => `
                <label class="item-check">
                    <input type="checkbox" name="tec" value="${t}"> 
                    <span>${t} (${baseDados[t].matricula})</span>
                </label>`).join('');
        }

        function gerarStatus() {
            document.getElementById('statusRadios').innerHTML = listaStatus.map(s => `
                <label class="item-check">
                    <input type="radio" name="status" value="${s}"> <span>${s}</span>
                </label>`).join('');
        }

        function salvarPresenca() {
            const dataSel = document.getElementById('dataSelecionada').value;
            const selecionados = Array.from(document.querySelectorAll('input[name="tec"]:checked')).map(i => i.value);
            const status = document.querySelector('input[name="status"]:checked')?.value;

            if (!dataSel || selecionados.length === 0 || !status) return alert("Preencha todos os campos!");

            let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");

            selecionados.forEach(nome => {
                let datasParaLancar = [dataSel];
                if (status === "PRESENTE") {
                    const d = new Date(dataSel + "T12:00:00");
                    const ultimoDia = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
                    for (let i = d.getDate() + 1; i <= ultimoDia; i++) {
                        datasParaLancar.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`);
                    }
                }
                datasParaLancar.forEach(dt => {
                    if (!db.find(r => r.data === dt && r.tecnico === nome)) {
                        db.push({ id: Date.now() + Math.random(), data: dt, ...baseDados[nome], tecnico: nome, status: status });
                    }
                });
            });

            localStorage.setItem(DB_KEY, JSON.stringify(db));
            atualizarTabela();
            alert("Lançamento concluído!");
        }

        function atualizarTabela() {
            const dt = document.getElementById('dataSelecionada').value;
            const busca = document.getElementById('inputBusca').value.toUpperCase();
            const limite = parseInt(document.getElementById('limiteRegistros').value);

            let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");

            // Filtro por Data e Busca (Nome/Matrícula)
            let filtrados = db.filter(r => {
                const matchData = r.data === dt;
                const matchBusca = r.tecnico.toUpperCase().includes(busca) || r.matricula.includes(busca);
                return matchData && matchBusca;
            }).sort((a, b) => a.tecnico.localeCompare(b.tecnico));

            // Atualiza Dashboard com o total filtrado da data (independente do limite visual)
            document.getElementById('count-uf').innerText = [...new Set(filtrados.map(r => r.uf))].length;
            document.getElementById('count-colab').innerText = filtrados.length;
            document.getElementById('count-super').innerText = [...new Set(filtrados.map(r => r.super))].length;
            document.getElementById('count-gerente').innerText = [...new Set(filtrados.map(r => r.gerente))].length;
            document.getElementById('count-empresa').innerText = [...new Set(filtrados.map(r => r.empresa))].length;

            // Aplica limite visual (Paginação simples)
            const visualizados = filtrados.slice(0, limite);

            document.getElementById('corpoTabela').innerHTML = visualizados.map(r => `
                <tr>
                    <td>${r.uf}</td>
                    <td>${r.empresa}</td>
                    <td>${r.bucket}</td>
                    <td>${r.matricula}</td>
                    <td><b>${r.tecnico}</b></td>
                    <td>${r.super}</td>
                    <td>${r.coord || '-'}</td>
                    <td>${r.gerente || '-'}</td>
                    <td><span style="padding:4px 8px; border-radius:10px; font-weight:bold; background:#eee;">${r.status}</span></td>
                    <td><button onclick="deletar('${r.id}')" style="border:none; background:none; cursor:pointer;">🗑️</button></td>
                </tr>
            `).join('');
        }

        function deletar(id) {
            let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            db = db.filter(r => String(r.id) !== String(id));
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            atualizarTabela();
        }

        function selectAll(check) { document.querySelectorAll('input[name="tec"]').forEach(c => c.checked = check); }

        function limparTudo() {
            if (confirm("Deseja apagar todos os registros do sistema?")) {
                localStorage.removeItem(DB_KEY);
                atualizarTabela();
            }
        }

        function exportarExcel() {
            const db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            if (db.length === 0) return alert("Não há dados para exportar.");
            const ws = XLSX.utils.json_to_sheet(db);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Presença");
            XLSX.writeFile(wb, "Relatorio_Presenca.xlsx");
        }
    </script>
</body>

</html>
