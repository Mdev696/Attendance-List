    <style>
        :root {
            --vivo-purple: #660099;
            --vivo-light: #F2F2F2;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--vivo-light);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--vivo-purple);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .login-box {
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            max-width: 400px;
            margin: 80px auto;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            min-width: 1200px;
            /* Aumentado para acomodar novas colunas */
        }

        th {
            background: #f1f5f9;
            color: var(--vivo-purple);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
            white-space: nowrap;
        }

        .filter-select {
            width: 100%;
            padding: 5px;
            font-size: 10px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            margin-top: 5px;
        }

        .btn-auth {
            background: var(--vivo-purple);

            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 14px;
        }

        input,

            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .badge-status {
            padding: 4px 8px;
            border-radius: 10px;
            font-weight: bold;
            background: #eee;
            font-size: 10px;
        }

        .btn-action {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

        const SENHA_GERAL = "123";

        // 1. Correlacionar Supervisores com a UF selecionada
        function filtrarSupervisoresPorUF() {
            const ufSel = document.getElementById('selectUF').value;
            const selectSup = document.getElementById('selectSupervisor');
            selectSup.innerHTML = '<option value="">Selecione seu nome...</option>';

            if (!ufSel) return;

            const filtrados = [...new Set(Object.values(baseDados)
                .filter(d => d.uf === ufSel)
                .map(d => d.super))].sort();

            filtrados.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.innerHTML = s;
                selectSup.appendChild(opt);
            });

            if (ufSel === "RJ") {
                let optAdmin = document.createElement('option');
                optAdmin.value = "Max"; optAdmin.innerHTML = "ADMINISTRADOR (MAX)";
                selectSup.appendChild(optAdmin);
            }
        }

        function autenticar() {
            const sup = document.getElementById('selectSupervisor').value;
            const senha = document.getElementById('senhaSupervisor').value;

            if (sup && (senha === SENHA_GERAL || senha === SENHA_ADMIN)) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('reportArea').classList.remove('hidden');
                document.getElementById('nomeLogado').innerText = "Supervisor: " + sup;
                carregarRelatorio(sup);
            } else {
                alert("Acesso negado. Selecione o nome e digite a senha correta.");
            }
        }

        function carregarRelatorio(supervisorNome) {
            const db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            dadosDoSupervisor = (supervisorNome === "Max") ? db : db.filter(r => r.super === supervisorNome);

            const opTec = [...new Set(dadosDoSupervisor.map(r => r.tecnico))].sort();
            const opStatus = [...new Set(dadosDoSupervisor.map(r => r.status))].sort();

            document.getElementById('f_tec').innerHTML = '<option value="">Todos</option>' + opTec.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('f_status').innerHTML = '<option value="">Todos</option>' + opStatus.map(s => `<option value="${s}">${s}</option>`).join('');

            atualizarTabela();
        }

        function atualizarTabela() {
            filtrar();
        }

        function renderizarTabela(dados) {
            const limite = parseInt(document.getElementById('limiteRegistros').value);
            const dadosExibicao = dados.slice(0, limite);
            const corpo = document.getElementById('corpoReport');

            corpo.innerHTML = dadosExibicao.map(r => `
                <tr>
                    <td>${r.uf}</td>
                    <td>${r.empresa}</td>
                    <td>${r.micro || r.bucket}</td>
                    <td>${r.matricula}</td>
                    <td><b>${r.tecnico}</b></td>
                    <td>${r.super}</td>
                    <td>${r.coord}</td>
                    <td>${r.gerente}</td>
                    <td><span class="badge-status">${r.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="editarStatus('${r.id}')">✏️</button>
                        <button class="btn-action" onclick="excluir('${r.id}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrar() {
            const fTec = document.getElementById('f_tec').value;
            const fStatus = document.getElementById('f_status').value;

            const filtrados = dadosDoSupervisor.filter(r => {
                return (fTec === "" || r.tecnico === fTec) &&
                    (fStatus === "" || r.status === fStatus);
            });
            renderizarTabela(filtrados);
        }

        // 3. Edição por números

            const opcao = prompt("Escolha o novo Status:\n1-PRESENTE\n2-FALTA\n3-ATESTADO\n4-FOLGA\n5-FÉRIAS");

            const mapaStatus = {
                "1": "PRESENTE",
                "2": "FALTA",
                "3": "ATESTADO",
                "4": "FOLGA",
                "5": "FÉRIAS"
            };

            const novoStatus = mapaStatus[opcao];

            if (novoStatus) {
                let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
                const i = db.findIndex(item => String(item.id) === String(id));
                if (i !== -1) {
                    db[i].status = novoStatus;
                    localStorage.setItem(DB_KEY, JSON.stringify(db));
                    carregarRelatorio(document.getElementById('selectSupervisor').value);
                }
            } else if (opcao !== null) {
                alert("Opção inválida! Digite um número de 1 a 5.");
            }
        }

        function excluir(id) {
            if (confirm("Excluir este lançamento?")) {
                let db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
                db = db.filter(item => String(item.id) !== String(id));
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                carregarRelatorio(document.getElementById('selectSupervisor').value);
            }
        }

        function exportarVisivelExcel() {
            const limite = parseInt(document.getElementById('limiteRegistros').value);
            const paraExportar = dadosDoSupervisor.slice(0, limite);

            if (paraExportar.length === 0) return alert("Nada para exportar.");

            const ws = XLSX.utils.json_to_sheet(paraExportar);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Validação");
            XLSX.writeFile(wb, `Validacao_Supervisor.xlsx`);
        }
    </script>
</body>

</html>
